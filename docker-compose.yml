services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - uvicorn
      - mini_agent.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    env_file:
      - .env
    environment:
      MINI_AGENT_TRACE_PATH: /app/data/agent-runs.json
      UV_LINK_MODE: copy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - streamlit
      - run
      - frontend/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
    env_file:
      - .env
    environment:
      MINI_AGENT_API_URL: http://api:8000
      UV_LINK_MODE: copy
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
